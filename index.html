<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Vocab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFFDF0; /* Vàng bơ nhạt */
        }
        .chinese-font {
            font-family: 'Noto Sans SC', sans-serif;
        }
        /* Hiệu ứng lật thẻ 3D */
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
            box-shadow: 0 10px 30px -5px rgba(240, 230, 140, 0.2);
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .soft-button {
            transition: all 0.2s;
        }
        .soft-button:active {
            transform: scale(0.9);
        }
        .nav-active {
            color: #4CAF50 !important;
        }
        .nav-active i {
            transform: translateY(-4px);
            transition: transform 0.2s;
        }
        /* Tùy chỉnh thanh cuộn */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #E8F5E9;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col max-w-4xl mx-auto text-slate-800 pb-40">

    <!-- Header (Chỉ giữ Logo và Profile) -->
    <nav class="sticky top-0 z-50 px-6 py-4 flex items-center justify-between bg-white/10 backdrop-blur-2xl border-b border-white/10">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#203F9A]/20 rounded-xl flex items-center justify-center text-[#203F9A] shadow-sm">
            <i data-lucide="book-open" class="w-6 h-6"></i>
        </div>
        <div>
            <h1 class="font-bold text-lg leading-none text-slate-700">HSK Vocab</h1>
            <select id="course-selector" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-transparent border-none outline-none cursor-pointer">
                <option value="hsk1">HSK 1</option>
            </select>
        </div>
    </div>
    
    <div class="flex items-center gap-3">
        <div class="flex flex-col items-center gap-1">
    <div class="w-9 h-9 rounded-full border-2 border-white shadow-sm bg-[#E7A0CC]/20 flex items-center justify-center text-[#E84797]">
        <i data-lucide="user" class="w-5 h-5"></i>
    </div>
    <span id="user-email-display" class="text-[9px] font-bold text-slate-400 lowercase tracking-tight leading-none">
        Guest
    </span>
</div>
        <button class="text-slate-400 hover:text-red-400 transition-colors">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </div>
</nav>

    <main class="flex-1 px-6 max-w-md mx-auto w-full">
        
        <!-- Auth Container -->
        <div id="auth-container" class="hidden py-10">
            <div id="auth-form" class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white">
                <h2 id="auth-title" class="text-2xl font-bold mb-8 text-center text-slate-800">Đăng nhập</h2>
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="Email của bạn" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#C8E6C9] transition-all" />
                    <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#C8E6C9] transition-all" />
                </div>
                <p id="auth-error" class="text-red-400 text-xs mt-4 px-2 hidden"></p>

                <div id="login-actions" class="mt-8 space-y-4">
                    <button onclick="handleLogin()" class="w-full py-4 bg-[#C8E6C9] text-[#2E7D32] rounded-2xl font-bold shadow-sm hover:bg-[#A5D6A7] transition-all soft-button">Đăng nhập</button>
                    <p class="text-center text-xs text-slate-400 font-medium">Chưa có tài khoản? <a href="#" onclick="toggleAuth(false)" class="text-[#4CAF50] font-bold">Đăng ký</a></p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="hidden py-4">
            
            <!-- View Study -->
            <div id="view-study" class="space-y-10">
                <!-- Tiến độ -->
                <div>
                    <div class="flex justify-between items-baseline mb-3">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Tiến trình học</span>
                        <span id="progress-text" class="text-sm font-bold text-[#4CAF50]">0/500</span>
                    </div>
                    <div class="w-full h-2 bg-white rounded-full overflow-hidden shadow-inner">
                        <div id="progress-bar" class="h-full bg-[#C8E6C9] rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Flashcard Section -->
                <div class="flex items-center gap-2 sm:gap-4 relative">
                    <button onclick="prevWord()" class="soft-button text-[#F0E68C] hover:text-[#FBC02D] transition-colors p-1">
                        <i data-lucide="chevron-left" class="w-10 h-10"></i>
                    </button>

                    <div class="card-container flex-1 aspect-[3/4]">
                        <div id="flashcard" class="card-inner" onclick="toggleFlip()">
                            <div class="card-face bg-white border-4 border-[#FFF9C4]/50">
                                <h2 id="card-hanzi" class="chinese-font text-8xl text-slate-800 mb-6 tracking-tighter"></h2>
                                <p id="card-pinyin" class="text-xl text-[#4CAF50] font-medium tracking-wide mb-4"></p>
                                <button onclick="event.stopPropagation(); playAudio()" class="text-slate-200 hover:text-[#FBC02D] transition-colors soft-button">
                                    <i data-lucide="volume-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                            <div class="card-face card-back bg-[#E8F5E9] border-4 border-white text-[#2E7D32] p-8">
                                <div class="text-center">
                                    <p class="text-[10px] font-bold text-[#81C784] uppercase tracking-widest mb-4">Ý nghĩa</p>
                                    <p id="card-meaning_vi" class="text-3xl font-bold mb-6 leading-tight"></p>
                                    <div class="w-8 h-1 bg-white/50 mx-auto rounded-full mb-6"></div>
                                    <p id="card-example" class="chinese-font text-sm text-[#4CAF50]/80 italic line-clamp-3"></p>
                                    <button onclick="event.stopPropagation(); playExample()" class="mt-4 text-[#81C784] hover:text-[#2E7D32] transition-colors soft-button">
                                        <i data-lucide="volume-1" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button onclick="nextWord()" class="soft-button text-[#F0E68C] hover:text-[#FBC02D] transition-colors p-1">
                        <i data-lucide="chevron-right" class="w-10 h-10"></i>
                    </button>
                </div>

                <!-- Nút Đã thuộc -->
                <div class="flex flex-col items-center pt-2 mb-8">
                    <button onclick="markAsLearned()" class="soft-button flex flex-col items-center gap-2 group">
                        <div class="w-16 h-16 rounded-full bg-white shadow-lg flex items-center justify-center text-[#4CAF50] group-hover:bg-[#E8F5E9] transition-all">
                            <i data-lucide="check" class="w-8 h-8"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-[#4CAF50] transition-colors uppercase tracking-widest">Đã thuộc</span>
                    </button>
                </div>
            </div>

            <!-- View List -->
            <div id="view-list" class="hidden space-y-6">
                <div class="bg-white rounded-3xl p-4 flex items-center gap-3 shadow-sm border border-white">
                    <i data-lucide="search" class="w-5 h-5 text-slate-300"></i>
                    <input type="text" id="search" oninput="handleSearch()" placeholder="Tìm kiếm từ vựng..." class="bg-transparent border-none focus:ring-0 w-full outline-none text-sm font-medium" />
                </div>
                
                <div class="bg-white rounded-[2rem] shadow-sm border border-white overflow-hidden">
                    <div class="max-h-[60vh] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <tbody id="list-body" class="divide-y divide-slate-50">
                                <!-- Dữ liệu từ JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Navigation (Sticky Bottom) -->
    <nav id="nav-tabs" class="fixed bottom-6 left-0 right-0 mx-auto w-[90%] max-w-md bg-white/90 backdrop-blur-md border border-white/50 rounded-[2.5rem] shadow-2xl px-8 py-4 flex justify-between items-center z-50">
    <button onclick="switchView('study')" id="btn-study" class="flex flex-col items-center gap-1 soft-button nav-active">
        <i data-lucide="layout-grid" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Học tập</span>
    </button>
    
    <button onclick="switchView('list')" id="btn-list" class="flex flex-col items-center gap-1 soft-button text-slate-300">
        <i data-lucide="list-video" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Danh sách</span>
    </button>

    <button class="flex flex-col items-center gap-1 soft-button text-slate-300">
        <i data-lucide="settings" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Cài đặt</span>
    </button>
</nav>

    <!-- Firebase & App Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="data.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    
</body>
</html>
