<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Vocab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/pinyin-pro"></script>
<style>



        .card-container { perspective: 1000px; }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(7, 51, 88, 0.05);
        }
        .soft-button:active { transform: scale(0.95); }
    </style>
</head>


<body class="min-h-screen flex flex-col max-w-4xl mx-auto text-slate-800 pb-40">
<div id="loading-screen" class="fixed inset-0 bg-[#FFFDF0] z-[999] flex items-center justify-center">
    <div class="flex flex-col items-center gap-4">
        <div class="w-12 h-12 border-4 border-[#0DA574] border-t-transparent rounded-full animate-spin"></div>
        <p class="font-bold text-[#073358] animate-pulse">Đang tải dữ liệu...</p>
    </div>
</div>
    <!-- Header (Chỉ giữ Logo và Profile) -->
    <nav id="main-header" class="hidden sticky top-0 z-50 px-6 py-4 flex items-center justify-between bg-white/10 backdrop-blur-2xl border-b border-white/10">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-logo rounded-xl flex items-center justify-center text-logo shadow-sm">
            <i data-lucide="book-open" class="w-6 h-6"></i>
        </div>
        <div>
            <h1 class="font-bold text-lg leading-none text-slate-700">HSK Vocab</h1>
            <button class="text-[10px] text-logo font-bold text-slate-400 uppercase tracking-widest bg-transparent border-none outline-none cursor-pointer">
                <span value="current-hsk-label">你好</span>
            </button>
        </div>
    </div>
    
    <div class="flex items-center gap-3">
        <div class="flex flex-col items-center gap-1">
            <div class="w-9 h-9 rounded-full border-2 border-white shadow-sm bg-logo flex items-center justify-center text-logo">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
            <span id="user-email-display" class="text-[9px] font-bold text-slate-400 lowercase tracking-tight leading-none text-logo">
                Guest
            </span>
        </div>
        <button onclick="handleLogout()" class="text-slate-400 hover:text-red-400 transition-colors soft-button">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </div>
</nav>

    <main class="flex-1 px-6 max-w-md mx-auto w-full h-full justify-center">
        
        <!-- Auth Container -->
        <!-- 1. Màn hình Đăng nhập (Center) -->
        <div id="auth-container" class="hidden flex flex-col justify-center px-6 h-full min-h-screen py-10">
            
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-white w-full text-center">
                <div class="w-20 h-20 bg-[#FFD716] rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
                    <i data-lucide="languages" class="w-10 h-10 text-[#073358]"></i>
                </div>
                <h2 id="auth-title" class="text-3xl font-bold mb-2 text-[#073358]">Xin chào!</h2>
                <p class="text-slate-400 text-sm mb-8">Đăng nhập để bắt đầu hành trình chinh phục HSK</p>
                
                <div class="space-y-4">
                    <div class="relative">
                        <i data-lucide="mail" class="w-5 h-5 absolute left-4 top-4 text-slate-300"></i>
                        <input type="email" id="email" placeholder="Email" class="w-full p-4 pl-12 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#FFD716] transition-all text-sm" />
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="w-5 h-5 absolute left-4 top-4 text-slate-300"></i>
                        <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 pl-12 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-[#FFD716] transition-all text-sm" />
                    </div>
                </div>
                
                <p id="auth-error" class="text-red-500 text-xs mt-4 hidden"></p>

                <div class="mt-8 space-y-4">
                    <button onclick="handleLogin()" class="w-full py-4 bg-[#0DA574] text-white rounded-2xl font-bold shadow-lg hover:bg-[#0b8a61] transition-all soft-button">Đăng nhập</button>
                    <p class="text-xs text-slate-400 font-medium">Bạn mới đến? <a href="#" onclick="toggleAuth(false)" class="text-[#0DA574] font-bold">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
        <div id="course-selection" class="hidden px-6 py-10">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-logo mb-2">Chọn lộ trình</h2>
                <p class="text-slate-500 text-sm italic">Bạn muốn học cấp độ nào?</p>
            </header>
            <div class="grid grid-cols-2 gap-4 pb-20" id="hsk-grid">
                </div>
        </div>
        <!-- Main Content -->
        <div id="main-content" class="hidden py-4">
            
            <!-- View Study -->
            <div id="view-study" class="space-y-10">
            
                <!-- Tiến độ -->
                <div>
                    <div class="flex justify-between items-baseline mb-3">
                        <span class="text-[10px] text-logo font-bold text-slate-400 uppercase tracking-[0.2em]">Tiến trình học</span>
                        <span id="progress-text" class="text-sm font-bold text-trangthai">0/500</span>
                    </div>
                    <div class="w-full h-2 bg-white rounded-full overflow-hidden shadow-inner">
                        <div id="progress-bar" class="h-full bg-trangthai rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Flashcard Section -->
                <div class="flex items-center gap-2 sm:gap-4 relative">
                    <button onclick="prevWord()" class="soft-button text-[#F0E68C] hover:text-[#FBC02D] transition-colors p-1">
                        <i data-lucide="chevron-left" class="w-10 h-10"></i>
                    </button>

                    <div class="card-container flex-1 aspect-[3/4]">
                        <div id="flashcard" class="card-inner" onclick="toggleFlip()">
                            <div class="card-face bg-white border-4 border-[#FFF9C4]/50">
                                <div class="chinese-word-display mb-4">
                                    <h2 id="card-hanzi" class="chinese-font text-8xl text-slate-800 mb-6 tracking-tighter"></h2>
                                </div>
                                <p id="card-pinyin" class="text-xl text-trangthai font-medium tracking-wide mb-4"></p>
                                <p id="card-meaning_vi-front" class="text-lg text-slate-500 font-light"></p>
                                <button onclick="event.stopPropagation(); playAudio()" class="text-slate-200 hover:text-[#FBC02D] transition-colors soft-button">
                                    <i data-lucide="volume-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                            <div class="card-face card-back bg-[#E8F5E9] border-4 border-white text-[#2E7D32] p-8">
                                <div class="text-center">
                                    <button onclick="toggleEditExample(); event.stopPropagation();" 
                                            class="absolute top-4 right-4 text-slate-400 hover:text-blue-500 transition-colors p-1 z-10">
                                        <i data-lucide="pencil" class="w-4 h-4"></i>
                                    </button>
                                    <p class="text-[10px] font-bold text-[#81C784] uppercase tracking-widest mb-4">Ý nghĩa</p>
                                    <div id="example-display-area"  class="mt-4 p-3  rounded-xl border border-slate-100">
                                        <p id="card-ex-hanzi" class="text-lg font-bold text-slate-800 chinese-font mb-1"></p>
                                        <p id="card-ex-pinyin" class="text-sm text-logo italic mb-1"></p>
                                        <p id="card-ex-meaning" class="text-sm text-slate-500"></p>
                                    </div>
                                    <div class="w-8 h-1 bg-white/50 mx-auto rounded-full mb-6"></div>
                                    <p id="card-example" class="chinese-font text-sm text-trangthai/80 italic line-clamp-3"></p>
                                    <button onclick="event.stopPropagation(); playExample()" class="mt-4 text-[#81C784] hover:text-[#2E7D32] transition-colors soft-button">
                                        <i data-lucide="volume-1" class="w-5 h-5"></i>
                                    </button>
                                    <div id="example-edit-area" onclick="event.stopPropagation()" class="hidden space-y-2">
                                    <input type="text"  id="user-ex-input" onclick="event.stopPropagation()" placeholder="Nhập câu tiếng Việt của bạn..." 
                                        class="w-full p-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                                    <div class="flex gap-2">
                                        <button onclick="saveCustomExample(); event.stopPropagation()" class="flex-1 py-1 bg-green-500 text-white text-xs rounded-md font-bold">Lưu & Dịch</button>
                                        <button onclick="toggleEditExample(); event.stopPropagation()" class="px-2 py-1 bg-slate-200 text-slate-600 text-xs rounded-md">Hủy</button>
                                    </div>
                                </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button onclick="nextWord()" class="soft-button text-[#F0E68C] hover:text-[#FBC02D] transition-colors p-1">
                        <i data-lucide="chevron-right" class="w-10 h-10"></i>
                    </button>
                </div>

                <!-- Nút Đã thuộc -->
                <div class="flex flex-col items-center pt-2 mb-8">
                    <button onclick="markAsLearned()" class="soft-button flex flex-col items-center gap-2 group">
                        <div class="w-16 h-16 rounded-full bg-white shadow-lg flex items-center justify-center text-trangthai group-hover:bg-[#E8F5E9] transition-all">
                            <i data-lucide="check" class="w-8 h-8"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-trangthai transition-colors uppercase tracking-widest"></span>
                    </button>
                </div>
            </div>

            <!-- View List -->
            <div id="view-list" class="hidden space-y-6">
                <div class="bg-white rounded-3xl p-4 flex items-center gap-3 shadow-sm border border-white">
                    <i data-lucide="search" class="w-5 h-5 text-slate-300"></i>
                    <input type="text" id="search" oninput="handleSearch()" placeholder="Tìm kiếm từ vựng..." class="bg-transparent border-none focus:ring-0 w-full outline-none text-sm font-medium" />
                </div>
                
                <div class="bg-white rounded-[2rem] shadow-sm border border-white overflow-hidden">
                    <div class="max-h-[60vh] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <tbody id="list-body" class="divide-y divide-slate-50">
                                <!-- Dữ liệu từ JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Navigation (Sticky Bottom) -->
    <nav id="nav-tabs" class="fixed bottom-6 left-0 right-0 mx-auto w-[90%] max-w-md bg-white/90 backdrop-blur-md border border-white/50 rounded-[2.5rem] shadow-2xl px-8 py-4 flex justify-between items-center z-50">
    <button onclick="showCourseSelection()" class="flex flex-col items-center gap-1 soft-button text-slate-300">
        <i data-lucide="undo-2" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Quay lại</span>
    </button>
    <button onclick="switchView('study')" id="btn-study" class="flex flex-col items-center gap-1 soft-button nav-active">
        <i data-lucide="layout-grid" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Học tập</span>
    </button>
    
    <button onclick="switchView('list')" id="btn-list" class="flex flex-col items-center gap-1 soft-button text-slate-300">
        <i data-lucide="list-video" class="w-6 h-6"></i>
        <span class="text-[10px] font-bold uppercase tracking-tighter">Danh sách</span>
    </button>
    
    
</nav>

    <!-- Firebase & App Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="data.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Render nút HSK bằng JS để an toàn hơn
        const levels = [
            { id: 1, color: '#0DA574', words: '500' }, { id: 2, color: '#0DA574', words: ' 1.272' },
            { id: 3, color: '#FFD716', words: '2.245' }, { id: 4, color: '#FFD716', words: '3.245' },
            { id: 5, color: '#FF8C00', words: '4.303' }, { id: 6, color: '#FF8C00', words: '5.456' },
            // { id: 9, color: '#073358', words: '11k' }
        ];

        const grid = document.getElementById('hsk-grid');
        grid.innerHTML = levels.map(l => `
            <button onclick="selectCourse(${l.id})" class="bg-white p-5 rounded-[2.5rem] shadow-sm border-b-4 border-slate-100 flex flex-col items-center gap-2">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-black text-xl" style="background-color: ${l.color}">${l.id}</div>
                <span class="font-bold text-logo">HSK ${l.id}</span>
                <span class="text-[9px] text-slate-400 font-bold uppercase">${l.words} từ</span>
            </button>
        `).join('');

        lucide.createIcons();
    </script>
</body>
</html>
